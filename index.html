<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte - Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="Logotipo do Projeto" class="logo">
        <h1>Agro Forte, Futuro Sustentável</h1>
    </header>

    <main>
        <section class="intro">
            <p>Explore como a produção agrícola e a preservação do meio ambiente podem caminhar juntas.</p>
        </section>

        <section class="atividade">
            <h2>Simulação de Plantio Sustentável</h2>
            <label for="quantidade">Quantidade de árvores plantadas:</label>
            <input type="number" id="quantidade" placeholder="Ex: 5">
            <button id="calcularBtn">Calcular Impacto</button>
            <div id="resultado"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Concurso Agrinho - Projeto de autoria própria</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
